name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get plugin metadata
        id: meta
        run: |
          # メインファイルは "Plugin Name:" ヘッダーを持つ .php を検出する
          # （リポジトリ名とファイル名で大文字小文字が異なるため basename は使わない）。
          PLUGIN_FILE=$(grep -l "Plugin Name:" *.php | head -1)
          PLUGIN_SLUG="${PLUGIN_FILE%.php}"
          VERSION=${GITHUB_REF#refs/tags/}
          echo "file=${PLUGIN_FILE}" >> "$GITHUB_OUTPUT"
          echo "slug=${PLUGIN_SLUG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify version in plugin header
        env:
          PLUGIN_FILE: ${{ steps.meta.outputs.file }}
          EXPECTED_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          HEADER_VERSION=$(grep -oP 'Version:\s*\K[0-9]+\.[0-9]+\.[0-9]+' "$PLUGIN_FILE")
          if [ "$HEADER_VERSION" != "$EXPECTED_VERSION" ]; then
            echo "::error::Tag version (${EXPECTED_VERSION}) does not match plugin header version (${HEADER_VERSION})"
            exit 1
          fi

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none

      - run: composer install --no-dev --no-interaction --optimize-autoloader

      - name: Create plugin zip
        env:
          SLUG: ${{ steps.meta.outputs.slug }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.husky' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='tests' \
            --exclude='bin' \
            --exclude='.wp-env.json' \
            --exclude='.wp-env.override.json' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='composer.json' \
            --exclude='composer.lock' \
            --exclude='phpcs.xml.dist' \
            --exclude='phpunit.xml.dist' \
            --exclude='.gitignore' \
            --exclude='.editorconfig' \
            --exclude='SPEC.md' \
            --exclude='debug.log' \
            --exclude='db.sql' \
            ./ "${SLUG}/"
          zip -r "${SLUG}-${VERSION}.zip" "${SLUG}/"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.meta.outputs.slug }}-${{ steps.meta.outputs.version }}.zip
          generate_release_notes: true
