name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  phpcs:
    name: phpcs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress
      - name: Run phpcs
        run: composer run phpcs

  phpunit:
    name: "PHPUnit (WP ${{ matrix.wp }} / PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          # MYSQL_DATABASE は指定しない。DB は install-wp-tests.sh に作成させる
          # （指定すると既存 DB と install-wp-tests.sh の作成処理が競合し得るため）。
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    strategy:
      fail-fast: false
      matrix:
        include:
          - wp: latest
            php: '8.3'
          - wp: latest
            php: '8.4'
          - wp: '6.8'
            php: '8.3'
          - wp: '6.8'
            php: '8.4'
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          extensions: mysqli
          coverage: none
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress
      # ubuntu-latest (24.04) には svn が含まれないため、install-wp-tests.sh の
      # WordPress テストスイート取得（svn）用に subversion を導入する。
      - name: Install subversion
        run: sudo apt-get update && sudo apt-get install -y subversion
      - name: Install WordPress test suite
        # 引数: <db-name> <db-user> <db-pass> <db-host> <wp-version>
        # 第6引数（SKIP_DB_CREATE）は渡さない＝install-wp-tests.sh に wordpress_test を作成させる。
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 ${{ matrix.wp }}
      - name: Run PHPUnit
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
        run: vendor/bin/phpunit --bootstrap tests/phpunit/bootstrap.php

  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wordpress/plugin-check-action@v1
        with:
          # vendor / tests / node_modules は本番プラグインに含まれないため除外する（誤検出回避）。
          exclude-directories: 'vendor,tests,node_modules,bin'
          # wp.org 公開用の plugin_repo と、フロント UI を持たないため accessibility は除外。
          categories: |
            general
            performance
            security
          ignore-warnings: true
