name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  phpcs:
    name: phpcs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer
          coverage: none
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress
      - name: Run phpcs
        run: composer run phpcs

  phpunit:
    name: "PHPUnit Unit (PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: none
      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress
      # Unit テストは WordPress 非依存（Brain\Monkey でモック）。WP テスト環境は不要。
      # Integration テストは wp-env でローカル実行する（README 参照）。
      - name: Run PHPUnit (unit)
        run: vendor/bin/phpunit --testsuite unit

  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wordpress/plugin-check-action@v1
        with:
          # vendor / tests / node_modules は本番プラグインに含まれないため除外する（誤検出回避）。
          exclude-directories: 'vendor,tests,node_modules,bin'
          # wp.org 公開用の plugin_repo と、フロント UI を持たないため accessibility は除外。
          categories: |
            general
            performance
            security
          ignore-warnings: true
